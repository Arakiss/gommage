name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace
      - run: cargo test --workspace

  determinism:
    # Determinism claim lives or dies by this matrix. Run the full forward +
    # shuffled sweep 10× per combination of (OS, locale). Any divergence is a
    # contract violation, not a flake.
    name: determinism sweep (x10) — ${{ matrix.os }} / ${{ matrix.locale }}
    runs-on: ${{ matrix.os }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            locale: C
          - os: ubuntu-latest
            locale: en_US.UTF-8
          - os: ubuntu-latest
            locale: de_DE.UTF-8
          - os: macos-latest
            locale: C
          - os: macos-latest
            locale: en_US.UTF-8
    env:
      LC_ALL: ${{ matrix.locale }}
      LANG:   ${{ matrix.locale }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install non-default locale (Linux)
        if: runner.os == 'Linux' && matrix.locale != 'C'
        run: |
          sudo apt-get update
          sudo apt-get install -y locales
          sudo locale-gen "${{ matrix.locale }}"
      - name: 10× forward + shuffled
        run: |
          for i in $(seq 1 10); do
            echo "--- sweep $i ---"
            cargo test -p gommage-core --test determinism -- --test-threads=1
          done

  # Umbrella job: single required status check that succeeds iff every row of
  # the determinism matrix above succeeded. Keeps branch protection sane (one
  # name to list) while the matrix expands or contracts freely.
  determinism-all:
    name: determinism sweep (all)
    runs-on: ubuntu-latest
    needs: determinism
    if: always()
    steps:
      - name: Roll up matrix result
        run: |
          if [[ "${{ needs.determinism.result }}" != "success" ]]; then
            echo "determinism matrix status: ${{ needs.determinism.result }}"
            exit 1
          fi
          echo "determinism matrix all green"

  policy-lint:
    name: policy lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Verify internal workspace dependency versions
        run: sh scripts/check-workspace-internal-deps.sh
      - name: Verify stdlib root mirrors
        run: |
          diff -ru policies crates/gommage-stdlib/policies
          diff -ru capabilities crates/gommage-stdlib/capabilities
      - run: cargo build -p gommage-cli
      - name: Init home and install shipped stdlib
        run: |
          export GOMMAGE_HOME="$RUNNER_TEMP/.gommage"
          ./target/debug/gommage init
          ./target/debug/gommage policy init --stdlib
          ./target/debug/gommage policy check

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans licenses sources

  semver-checks:
    name: cargo-semver-checks (gommage-core)
    runs-on: ubuntu-latest
    # Only run on PRs against main — baseline is the target branch tip.
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0            # full history so baseline-rev can check out main
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: obi1kenobi/cargo-semver-checks-action@v2
        with:
          package: gommage-core
          # `gommage-core` is not on crates.io yet, so the default baseline
          # (latest published version) doesn't exist. Compare against the PR
          # target branch instead: any breaking API change vs that tip fails
          # the check. When we publish to crates.io, this line can go away
          # and the action reverts to the published-version baseline.
          #
          # Use the fully-qualified remote ref so the rev resolves without
          # needing a local branch (fetch-depth: 0 only brings remotes).
          baseline-rev: origin/${{ github.base_ref }}

  commitlint:
    name: commitlint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.pull_request.user.login != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@v6
        with:
          configFile: .commitlintrc.yaml
          failOnWarnings: true
