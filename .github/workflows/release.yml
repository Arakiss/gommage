name: release

on:
  push:
    branches: [main]
    # Binary-build step triggers off the gommage-cli tag (the user-visible one).
    # Per-crate tags also exist (gommage-core-v*, …) but binaries live on cli.
    tags:
      - "gommage-cli-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to retroactively build + attach binaries to (e.g. gommage-cli-v0.1.1-alpha.1)"
        required: true
        type: string

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # 1) On push to main: run release-please. Opens / updates the release PR.
  #    Merging that PR creates per-crate tags; the tag push then drives (2).
  release-please:
    name: release-please
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.GITHUB_TOKEN }}

  # 2) On tag push gommage-cli-v*: build cross-platform binaries, attach to
  #    that tag's GitHub release. Also runnable manually via workflow_dispatch
  #    to retroactively build binaries for tags that predated this workflow.
  build-binaries:
    name: build (${{ matrix.target }})
    if: >
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/gommage-cli-v'))
      || github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: gommage-x86_64-linux
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            asset: gommage-aarch64-linux
          - os: macos-latest
            target: x86_64-apple-darwin
            asset: gommage-x86_64-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: gommage-aarch64-darwin
    steps:
      - uses: actions/checkout@v6
        with:
          # When workflow_dispatch-triggered, check out the tag provided via input.
          ref: ${{ github.event.inputs.tag || github.ref }}
      - name: Resolve and validate release tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            upload_tag="${{ github.event.inputs.tag }}"
          else
            upload_tag="${GITHUB_REF#refs/tags/}"
          fi
          expected_ref="refs/tags/${upload_tag}"
          if [[ "${GITHUB_REF}" != "${expected_ref}" ]]; then
            echo "::error::Release signatures are verified against ${expected_ref}, but this run identity is ${GITHUB_REF}. Re-run workflow_dispatch from the tag ref."
            exit 1
          fi
          echo "UPLOAD_TAG=${upload_tag}" >> "$GITHUB_ENV"
          echo "SIGNER_IDENTITY=https://github.com/${GITHUB_REPOSITORY}/.github/workflows/release.yml@${expected_ref}" >> "$GITHUB_ENV"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - uses: sigstore/cosign-installer@v4.1.1
      - name: Install cross-linker (linux-aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p .cargo
          echo '[target.aarch64-unknown-linux-gnu]'    >  .cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"'      >> .cargo/config.toml
      - run: cargo build --release --target ${{ matrix.target }} --workspace
      - name: Package + checksum
        shell: bash
        run: |
          mkdir -p dist
          cd target/${{ matrix.target }}/release
          tar czf "$GITHUB_WORKSPACE/dist/${{ matrix.asset }}.tar.gz" \
              gommage gommage-daemon gommage-mcp
          cd "$GITHUB_WORKSPACE"
          (cd dist && shasum -a 256 "${{ matrix.asset }}.tar.gz" \
              > "${{ matrix.asset }}.tar.gz.sha256")
      - name: Sign + verify artifact
        shell: bash
        run: |
          artifact="dist/${{ matrix.asset }}.tar.gz"
          bundle="${artifact}.sigstore.json"
          cosign sign-blob --yes "${artifact}" --bundle "${bundle}"
          cosign verify-blob "${artifact}" \
            --bundle "${bundle}" \
            --certificate-identity "${SIGNER_IDENTITY}" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com"
      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.UPLOAD_TAG }}
          files: |
            dist/${{ matrix.asset }}.tar.gz
            dist/${{ matrix.asset }}.tar.gz.sha256
            dist/${{ matrix.asset }}.tar.gz.sigstore.json
