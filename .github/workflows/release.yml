name: release

on:
  push:
    branches: [main]
    # Binary-build step triggers off the gommage-cli tag (the user-visible one).
    # Per-crate tags also exist (gommage-core-v*, …) but binaries live on cli.
    tags:
      - "gommage-cli-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to retroactively build + attach binaries to (e.g. gommage-cli-v0.1.1-alpha.1)"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # 1) On push to main: run release-please. Opens / updates the release PR.
  #    Merging that PR creates per-crate tags; the tag push then drives (2).
  release-please:
    name: release-please
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.GITHUB_TOKEN }}

  # 2) On tag push gommage-cli-v*: build cross-platform binaries, attach to
  #    that tag's GitHub release. Also runnable manually via workflow_dispatch
  #    to retroactively build binaries for tags that predated this workflow.
  build-binaries:
    name: build (${{ matrix.target }})
    if: >
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/gommage-cli-v'))
      || github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: gommage-x86_64-linux
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            asset: gommage-aarch64-linux
          - os: macos-latest
            target: x86_64-apple-darwin
            asset: gommage-x86_64-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: gommage-aarch64-darwin
    steps:
      - uses: actions/checkout@v6
        with:
          # When workflow_dispatch-triggered, check out the tag provided via input.
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install cross-linker (linux-aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p .cargo
          echo '[target.aarch64-unknown-linux-gnu]'    >  .cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"'      >> .cargo/config.toml
      - run: cargo build --release --target ${{ matrix.target }} --workspace
      - name: Package + checksum
        shell: bash
        run: |
          mkdir -p dist
          cd target/${{ matrix.target }}/release
          tar czf "$GITHUB_WORKSPACE/dist/${{ matrix.asset }}.tar.gz" \
              gommage gommage-daemon gommage-mcp
          cd "$GITHUB_WORKSPACE"
          shasum -a 256 "dist/${{ matrix.asset }}.tar.gz" \
              > "dist/${{ matrix.asset }}.tar.gz.sha256"
      - name: Resolve upload tag
        id: tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF#refs/tags/}"       >> "$GITHUB_OUTPUT"
          fi
      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          files: |
            dist/${{ matrix.asset }}.tar.gz
            dist/${{ matrix.asset }}.tar.gz.sha256
