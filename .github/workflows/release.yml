name: release

on:
  push:
    branches: [main]
    # Binary-build step triggers off the gommage-cli tag (the user-visible one).
    # Per-crate tags also exist (gommage-core-v*, …) but binaries live on cli.
    tags:
      - "gommage-cli-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to retroactively build + attach binaries to (e.g. gommage-cli-vX.Y.Z-alpha.N)"
        required: true
        type: string

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # 1) On push to main: run release-please. Opens / updates the release PR.
  #    When a CLI release is created, dispatch this workflow from the created
  #    tag so Sigstore identity remains tied to the release tag ref.
  release-please:
    name: release-please
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      actions: write
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Verify internal workspace dependency versions
        run: sh scripts/check-workspace-internal-deps.sh
      - name: Verify living docs avoid pinned release drift
        run: sh scripts/check-doc-release-refs.sh
      - id: release
        uses: googleapis/release-please-action@v4
        env:
          # release-please-action v4.4.1 still declares node20; opt in early to
          # GitHub's Node 24 runtime before the hosted-runner default changes.
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Mark alpha releases as prereleases
        if: ${{ steps.release.outputs.releases_created == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_OUTPUTS: ${{ toJson(steps.release.outputs) }}
        shell: bash
        run: |
          set -euo pipefail

          tags="$(
            node <<'NODE'
          const outputs = JSON.parse(process.env.RELEASE_OUTPUTS);
          const tags = [...new Set(Object.entries(outputs)
            .filter(([key, value]) => {
              return (key === "tag_name" || key.endsWith("--tag_name"))
                && typeof value === "string"
                && value.includes("-alpha.");
            })
            .map(([, value]) => value))]
            .sort();
          for (const tag of tags) {
            console.log(tag);
          }
          NODE
          )"

          if [[ -z "${tags}" ]]; then
            echo "No alpha release tags emitted by release-please."
            exit 0
          fi

          while IFS= read -r tag; do
            [[ -n "${tag}" ]] || continue
            gh release edit "${tag}" --repo "${GITHUB_REPOSITORY}" --prerelease --latest=false
          done <<< "${tags}"
      - name: Trigger CLI binary build
        if: ${{ steps.release.outputs['crates/gommage-cli--release_created'] == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLI_TAG: ${{ steps.release.outputs['crates/gommage-cli--tag_name'] }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${CLI_TAG}" ]]; then
            echo "::error::Release Please reported a CLI release but did not emit a tag."
            exit 1
          fi

          gh workflow run release.yml --repo "${GITHUB_REPOSITORY}" --ref "${CLI_TAG}" -f "tag=${CLI_TAG}"

  # 2) On tag push gommage-cli-v*: build cross-platform binaries, attach to
  #    that tag's GitHub release. release-please dispatches this job explicitly
  #    because GITHUB_TOKEN-created tag pushes do not recursively start another
  #    workflow run. It is also runnable manually via workflow_dispatch to
  #    retroactively build binaries for tags that predated this workflow.
  build-binaries:
    name: build (${{ matrix.target }})
    if: >
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/gommage-cli-v'))
      || github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    permissions:
      contents: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: gommage-x86_64-linux
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            asset: gommage-aarch64-linux
          - os: macos-latest
            target: x86_64-apple-darwin
            asset: gommage-x86_64-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: gommage-aarch64-darwin
    steps:
      - uses: actions/checkout@v6
        with:
          # When workflow_dispatch-triggered, check out the tag provided via input.
          ref: ${{ github.event.inputs.tag || github.ref }}
      - name: Resolve and validate release tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            upload_tag="${{ github.event.inputs.tag }}"
          else
            upload_tag="${GITHUB_REF#refs/tags/}"
          fi
          expected_ref="refs/tags/${upload_tag}"
          if [[ "${GITHUB_REF}" != "${expected_ref}" ]]; then
            echo "::error::Release signatures are verified against ${expected_ref}, but this run identity is ${GITHUB_REF}. Re-run workflow_dispatch from the tag ref."
            exit 1
          fi
          echo "UPLOAD_TAG=${upload_tag}" >> "$GITHUB_ENV"
          echo "SIGNER_IDENTITY=https://github.com/${GITHUB_REPOSITORY}/.github/workflows/release.yml@${expected_ref}" >> "$GITHUB_ENV"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - uses: sigstore/cosign-installer@v4.1.1
      - name: Install cross toolchain (linux-aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        timeout-minutes: 10
        shell: bash
        run: |
          set -euo pipefail

          for attempt in 1 2 3; do
            if sudo env DEBIAN_FRONTEND=noninteractive timeout 300s apt-get update \
              && sudo env DEBIAN_FRONTEND=noninteractive timeout 300s apt-get install -y --no-install-recommends gcc-aarch64-linux-gnu libc6-dev-arm64-cross; then
              break
            fi

            if [[ "${attempt}" == "3" ]]; then
              echo "::error::Failed to install Linux aarch64 cross toolchain after 3 attempts."
              exit 1
            fi

            sleep "$((attempt * 10))"
          done

          mkdir -p .cargo
          echo '[target.aarch64-unknown-linux-gnu]'    >  .cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"'      >> .cargo/config.toml
      - name: Build release binaries
        timeout-minutes: 25
        run: cargo build --release --target ${{ matrix.target }} --workspace
      - name: Package + checksum
        shell: bash
        run: |
          mkdir -p dist
          cd target/${{ matrix.target }}/release
          tar czf "$GITHUB_WORKSPACE/dist/${{ matrix.asset }}.tar.gz" \
              gommage gommage-daemon gommage-mcp
          cd "$GITHUB_WORKSPACE"
          (cd dist && shasum -a 256 "${{ matrix.asset }}.tar.gz" \
              > "${{ matrix.asset }}.tar.gz.sha256")
      - name: Sign + verify artifact
        shell: bash
        run: |
          artifact="dist/${{ matrix.asset }}.tar.gz"
          bundle="${artifact}.sigstore.json"
          cosign sign-blob --yes "${artifact}" --bundle "${bundle}"
          cosign verify-blob "${artifact}" \
            --bundle "${bundle}" \
            --certificate-identity "${SIGNER_IDENTITY}" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com"
      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.UPLOAD_TAG }}
          files: |
            dist/${{ matrix.asset }}.tar.gz
            dist/${{ matrix.asset }}.tar.gz.sha256
            dist/${{ matrix.asset }}.tar.gz.sigstore.json
