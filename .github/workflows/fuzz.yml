name: fuzz

on:
  schedule:
    - cron: "17 3 * * 1"   # Monday ~03:17 UTC
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fuzz-capability-mapper:
    name: fuzz — capability mapper
    runs-on: ubuntu-latest
    steps:
