# cargo-deny configuration for the gommage workspace.
#
# Run locally with: `cargo deny check`
# CI runs: advisories, bans, licenses, sources.

[graph]
all-features = true
no-default-features = false

[advisories]
version = 2
# All known advisories are errors — no silent exceptions.
ignore = []
# yanked crates block the build.
yanked = "deny"

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Deterministic dep graph — duplicate versions are a smell, warn for now.
highlight = "all"
deny = [
    # Place any hard-banned crates here (e.g., ones with known CVEs we can't ignore).
]
skip = []
skip-tree = []

[licenses]
version = 2
# Allowlist — anything else trips the build.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "Zlib",
    "MPL-2.0",
]
confidence-threshold = 0.92
exceptions = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
